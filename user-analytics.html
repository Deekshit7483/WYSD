<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Analytics - WYSD 2025</title>
    <link rel="stylesheet" href="user-analytics.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">WYSD 2025</a>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="user-analytics.html" class="active">User Analytics</a></li>
                <li><a href="test.html">Take Test</a></li>
                <li><a href="leaderboard.html">Leaderboard</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="container">
            <h2>User Analytics</h2>
            <div class="analytics-section">
                <div class="chart-card">
                    <h3>Questions Completed Per Attempt</h3>
                    <canvas id="lineChart"></canvas>
                </div>
                <div class="chart-card">
                    <h3>Right vs Wrong (Selected Attempt)</h3>
                    <canvas id="ringChart"></canvas>
                    <div id="attemptSelector"></div>
                </div>
            </div>
        </div>
    </main>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js';
        import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js';
        import { getFirestore, collection, query, where, getDocs, orderBy } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyD2WcLwVWvylk6fiEietUSDRp4JG9PnI8o",
            authDomain: "wysd-a7d59.firebaseapp.com",
            projectId: "wysd-a7d59",
            storageBucket: "wysd-a7d59.firebasestorage.app",
            messagingSenderId: "942089219233",
            appId: "1:942089219233:web:4f4a7736325a0602ba94e0",
            measurementId: "G-FHVP7SJQLH"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let attempts = [];
        let lineChart, ringChart;

        function renderLineChart(attempts) {
            const ctx = document.getElementById('lineChart').getContext('2d');
            if (lineChart) lineChart.destroy();
            lineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: attempts.map((a, i) => `Attempt ${i + 1}`),
                    datasets: [{
                        label: 'Questions Completed',
                        data: attempts.map(a => a.totalQuestions),
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37,99,235,0.1)',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: { beginAtZero: true, precision: 0 }
                    }
                }
            });
        }

        function renderRingChart(attempt) {
            const ctx = document.getElementById('ringChart').getContext('2d');
            if (ringChart) ringChart.destroy();
            ringChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Right', 'Wrong'],
                    datasets: [{
                        data: [attempt.correct, attempt.wrong],
                        backgroundColor: ['#10b981', '#ef4444'],
                        borderWidth: 2
                    }]
                },
                options: {
                    cutout: '70%',
                    plugins: {
                        legend: { display: true, position: 'bottom' }
                    }
                }
            });
        }

        function renderAttemptSelector(attempts) {
            const selector = document.getElementById('attemptSelector');
            selector.innerHTML = '';
            if (attempts.length === 0) return;
            const select = document.createElement('select');
            attempts.forEach((a, i) => {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = `Attempt ${i + 1} (${a.date})`;
                select.appendChild(option);
            });
            select.addEventListener('change', e => {
                renderRingChart(attempts[e.target.value]);
            });
            selector.appendChild(select);
            renderRingChart(attempts[0]);
        }

        async function loadUserAttempts(uid) {
            const q = query(collection(db, 'test_results'), where('uid', '==', uid), orderBy('completedAt', 'asc'));
            const snapshot = await getDocs(q);
            attempts = [];
            snapshot.forEach(doc => {
                const data = doc.data();
                const correct = Array.isArray(data.questions) ? data.questions.filter(q => q.isCorrect).length : 0;
                const wrong = Array.isArray(data.questions) ? data.questions.length - correct : 0;
                attempts.push({
                    totalQuestions: data.totalQuestions || (data.questions ? data.questions.length : 0),
                    correct,
                    wrong,
                    date: data.completedAt ? new Date(data.completedAt).toLocaleDateString() : 'N/A'
                });
            });
            renderLineChart(attempts);
            renderAttemptSelector(attempts);
        }

        onAuthStateChanged(auth, user => {
            if (user) {
                loadUserAttempts(user.uid);
            } else {
                document.querySelector('.container').innerHTML = '<p>Please log in to view your analytics.</p>';
            }
        });
    </script>
</body>
</html>
